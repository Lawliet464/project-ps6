<!-- CHOIX DU RÔLE -->
@if (phase === 'role') {
  <div id="choixRole">
    <div class="role-card">
      <div class="role-emoji">🧓</div>
      <h2>Qui joue ?</h2>
      <p>Choisissez votre profil pour adapter le jeu</p>
      <div class="role-boutons">
        <button class="role-btn" (click)="choisirRole('accueilli')">
          <span class="role-icon">🧓</span>
          <span class="role-label">Je joue tout seul</span>
          <span class="role-desc">Aide visuelle, messages simples</span>
        </button>
        <button class="role-btn" (click)="choisirRole('aidant')">
          <span class="role-icon">🤝</span>
          <span class="role-label">Je joue avec mon aidant</span>
          <span class="role-desc">Explications détaillées, suivi des erreurs</span>
        </button>
      </div>
    </div>
  </div>
}

<!-- ACCUEIL -->
@if (phase === 'accueil') {
  <div id="accueil">
    <h1>Faites de votre mieux !</h1>
    <button (click)="commencer()">▶ Commencer le jeu</button>
  </div>
}

<!-- MEMORY -->
@if (phase === 'memory') {
  <app-memory-board (finished)="passerAssoc()"></app-memory-board>
}

<!-- ASSOCIATION -->
@if (phase === 'assoc') {
  <app-assoc-board (finished)="terminer()"></app-assoc-board>
}

<!-- FIN -->
@if (phase === 'fin') {
  <app-recap-fin [sequence]="sequenceFinale" (rejouer)="rejouer()"></app-recap-fin>
}
