<div class="plateau">
  @for (c of cartes; track c.type + c.image) {
    <app-memory-card
      [image]="c.image"
      [label]="c.label"
      [type]="c.type"
      [retournee]="c.retournee"
      [surbrillance]="c.surbrillance"
      [bloquee]="estBloque"
      (cardClick)="clickCarte(c)">
    </app-memory-card>
  }
</div>

<button class="btn-aide" (click)="surbrillanceUnePaire()">💡 Aide</button>
