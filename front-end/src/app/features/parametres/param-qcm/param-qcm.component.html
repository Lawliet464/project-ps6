<div class="param-card"> <span class="param-label">{{ label }}</span>
  
  <div class="qcm-group">
    @for (opt of options; track opt) {
      <div class="qcm-option">
        <input type="checkbox" 
               [id]="label + opt" 
               [checked]="isChecked(opt)"
               (change)="toggleOption(opt, $event)">
        <label [for]="label + opt">{{ opt }}</label>
      </div>
    }
  </div>
</div>
