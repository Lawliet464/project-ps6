<main>
  <button class="btn-retour" (click)="retour()">← Retour</button>
  <h1>Statistiques</h1>

  <ng-container *ngIf="patientActif; else aucunPatient">

    <div class="patient-header">
      <div class="patient-avatar">{{ patientActif.prenom[0] }}</div>
      <div class="patient-info">
        <h2>{{ patientActif.prenom }}</h2>
        <span class="badge-niveau" [style.background]="niveauColor(patientActif.niveau)">
          {{ niveauLabel(patientActif.niveau) }}
        </span>
      </div>
      <div class="patient-kpi">
        <div class="kpi">
          <span class="kpi-value">{{ historiqueParties.length }}</span>
          <span class="kpi-label">parties</span>
        </div>
        <div class="kpi">
          <span class="kpi-value">{{ tauxMoyen }}%</span>
          <span class="kpi-label">taux moyen</span>
        </div>
        <div class="kpi">
          <span class="kpi-value">{{ totalIndices }}</span>
          <span class="kpi-label">indices utilisés</span>
        </div>
      </div>
    </div>

    <app-graphique-courbe [parties]="historiqueParties"></app-graphique-courbe>
    <app-tableau-historique [parties]="historiqueParties"></app-tableau-historique>

  </ng-container>

  <ng-template #aucunPatient>
    <p class="no-patient">Aucun accueilli sélectionné. Retournez au tableau de bord et choisissez un profil.</p>
  </ng-template>
</main>
