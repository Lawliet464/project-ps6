<div class="recap-fin">
  <div class="recap-card">
    <h2>🎉 Bravo !</h2>
    <p class="recap-sous-titre">Voilà comment {{ game.themeChoisi?.nom }} :</p>

    <div class="recap-sequence">
      @for (elem of sequenceTriee; track elem.id; let i = $index) {
        <div class="recap-item" [style.animation-delay]="(i * 0.1) + 's'">
          <div class="recap-num">{{ elem.id }}</div>
          <img [src]="elem.image" [alt]="elem.nom">
          <p>{{ elem.nom }}</p>
        </div>
        @if (i < sequenceTriee.length - 1) {
          <div class="recap-fleche">→</div>
        }
      }
    </div>

    <button class="btn-rejouer" (click)="onRejouer()">🔄 Rejouer</button>
  </div>
</div>
